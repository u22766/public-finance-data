# .github/workflows/validate.yml
# public-finance-data CI Validation
# Runs on every push and PR to main
#
# Original: 179 checks (validate.py)
# OM-11 addition: ~120 Tier 2 checks (validate_tier2.py)
# OM-14 addition: 7 Medicare checks (validate_medicare.py)
# Housekeeping: 4 historical file checks (validate_historical.py)
# OM-15b addition: 92 pharmacy checks (validate_pharmacy.py)
# Session 22: 116 dental checks (validate_dental.py)
# Session 23: 71 OBBBA checks (validate_obbba.py)

name: Validate Data Files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Run core validation (179 checks)
        run: python tests/validate.py
      
      - name: Run Tier 2 validation (~120 checks)
        run: python tests/validate_tier2.py states/state-benefits.json
      
      - name: Validate Medicare rates
        run: python tests/validate_medicare.py federal/healthcare/medicare-rates.json

      - name: Validate DCIPS Pay Tables
        run: python tests/validate_dcips.py

      - name: Validate historical data files
        run: python tests/validate_historical.py

      - name: Validate TRICARE pharmacy costs (92 checks)
        run: python tests/validate_pharmacy.py

      - name: Validate TRICARE dental costs (116 checks)
        run: python tests/validate_dental.py

      - name: Validate OBBBA tax provisions (71 checks)
        run: python tests/validate_obbba.py
      
      - name: Validation summary
        if: success()
        run: echo "✓ All validation checks passed"
